name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --features ferroly/full -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (default features)
        run: cargo build -p ferroly
      - name: Test (all features)
        run: cargo test -p ferroly --features full

  docs:
    name: Doc build
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps -p ferroly --features full

  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    # `RUSTUP_TOOLCHAIN` overrides the pinned `rust-toolchain.toml` (stable) so
    # this job actually verifies the declared minimum supported Rust version.
    env:
      RUSTUP_TOOLCHAIN: "1.75.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
      # `--locked` fails loudly if Cargo.lock drifts to a version that raises the
      # MSRV (e.g. a transitive dep jumping to edition 2024) instead of silently
      # re-resolving. Keep transitive deps pinned to 1.75-compatible versions.
      - run: cargo build -p ferroly --features full --locked

  coverage:
    name: Coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Measure coverage
        run: cargo llvm-cov -p ferroly --features full --summary-only
