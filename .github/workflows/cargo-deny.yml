name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-check advisories weekly even without a code change.
    - cron: "0 6 * * 1"

jobs:
  cargo-deny:
    name: License, advisory & dependency checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources advisories
