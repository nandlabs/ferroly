name: Version guard

# Guards releases on PRs into `main`:
#   1. The crate version (workspace Cargo.toml) and the README version badge
#      must agree.
#   2. That version must not already be published as a `v<version>` git tag —
#      otherwise the version needs bumping before merge.
on:
  pull_request:
    branches: [main]

jobs:
  version-guard:
    name: Version consistency & unused tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0     # need full history + tags
          fetch-tags: true

      - name: Check versions and tag
        run: |
          set -euo pipefail

          # Crate version from [workspace.package] in the root Cargo.toml.
          CARGO_VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"

          # Version from the README shields.io badge (…/badge/version-X.Y.Z-…).
          README_VERSION="$(grep -oE 'version-[0-9]+\.[0-9]+\.[0-9]+-' README.md | head -1 | sed -E 's/version-([0-9.]+)-/\1/')"

          echo "Cargo version : ${CARGO_VERSION:-<none>}"
          echo "README version: ${README_VERSION:-<none>}"

          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not read the crate version from Cargo.toml"
            exit 1
          fi
          if [ -z "$README_VERSION" ]; then
            echo "::error::Could not read the version badge from README.md"
            exit 1
          fi

          # 1) Cargo and README must match.
          if [ "$CARGO_VERSION" != "$README_VERSION" ]; then
            echo "::error::Version mismatch — Cargo.toml is $CARGO_VERSION but the README badge is $README_VERSION. Update both to the same version."
            exit 1
          fi

          # 2) The version must not already be tagged/released.
          git fetch --tags --force --quiet
          if git rev-parse -q --verify "refs/tags/v$CARGO_VERSION" >/dev/null; then
            echo "::error::Tag v$CARGO_VERSION already exists — bump the version in Cargo.toml and the README before merging."
            exit 1
          fi

          echo "OK: version $CARGO_VERSION is consistent and not yet tagged."
